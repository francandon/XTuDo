name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-revision-date-localized-plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs-material \
            mkdocstrings[python] \
            mkdocs-jupyter \
            mkdocs-awesome-pages-plugin \
            mkdocs-git-revision-date-localized-plugin \
            nbformat>=5.1.4

      - name: Normalize notebooks (add missing cell ids)
        run: |
          python - <<'PY'
          import nbformat, pathlib, uuid, sys
          changed_any = False
          def ensure_ids(nb):
              changed = False
              for cell in nb.cells:
                  # add an id if missing
                  if not getattr(cell, "id", None):
                      cell.id = uuid.uuid4().hex[:8]
                      changed = True
              return changed
          for p in pathlib.Path("docs").rglob("*.ipynb"):
              nb = nbformat.read(p, as_version=4)
              if ensure_ids(nb):
                  # validate after assigning ids (silences MissingIDFieldWarning)
                  nbformat.validate(nb)
                  nbformat.write(nb, p)
                  print("Normalized:", p)
                  changed_any = True
              else:
                  print("OK (already has ids):", p)
          sys.exit(0)
          PY

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
